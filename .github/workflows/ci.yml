name: EcoBPF CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Least-privilege: read-only by default; specific jobs add what they need.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  PYTHON_VERSION: "3.11"
  CLANG_VERSION: "14"
  # Pin golangci-lint to a deterministic version
  GOLANGCI_LINT_VERSION: "v1.62.0"
  NODE_VERSION: "20"

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install Go lint tools
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install Python lint tools
        run: pip install flake8

      - name: Go lint
        run: golangci-lint run ./...

      - name: Python lint
        run: flake8 ml/ --max-line-length=100 --ignore=E501,W503

      - name: BPF source lint (best-effort)
        run: |
          sudo apt-get install -y --no-install-recommends clang-tidy-${{ env.CLANG_VERSION }} 2>/dev/null || true
          if command -v clang-tidy-${{ env.CLANG_VERSION }} &>/dev/null; then
            clang-tidy-${{ env.CLANG_VERSION }} bpf/*.bpf.c -- \
              -O2 -target bpf -I bpf/headers || true
          fi

  # ─── Frontend lint + build ─────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript/React Dashboard)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (ci — deterministic)
        run: npm ci

      - name: Lint (ESLint + TypeScript)
        run: npm run lint

      - name: Build dashboard
        run: npm run build

      - name: Upload dashboard dist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dashboard-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Build eBPF ────────────────────────────────────────────────────
  build-bpf:
    name: Compile eBPF Probes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-${{ env.CLANG_VERSION }} \
            llvm-${{ env.CLANG_VERSION }} \
            libbpf-dev \
            linux-headers-generic

      - name: Compile BPF objects
        run: |
          for src in bpf/*.bpf.c; do
            obj="${src%.bpf.c}.bpf.o"
            echo "Compiling $src → $obj"
            clang-${{ env.CLANG_VERSION }} -O2 -g -Wall -Werror \
              -target bpf -D__TARGET_ARCH_x86 \
              -I bpf/headers \
              -c "$src" -o "$obj"
          done

      - name: BPF verifier dry-run (best-effort — requires privileged runner)
        run: |
          for obj in bpf/*.bpf.o; do
            echo "Verifying $obj..."
            sudo bpftool prog load "$obj" /sys/fs/bpf/ci_verify_test 2>&1 && \
              sudo rm -f /sys/fs/bpf/ci_verify_test && \
              echo "✓ $obj passed" || \
              echo "⚠ $obj verifier check skipped (unprivileged runner)"
          done

      - name: Upload BPF objects
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: bpf-objects
          path: bpf/*.bpf.o
          retention-days: 7

  # ─── Build Go ──────────────────────────────────────────────────────
  build-go:
    name: Build Go Daemon
    runs-on: ubuntu-latest
    # Run independently of build-bpf so the Go pipeline does not stall
    # when eBPF compilation is unavailable (e.g. missing kernel headers).
    # The binary is built without pre-compiled .bpf.o files here; full
    # integration is validated in the docker-build job.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build daemon
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "ci-${{ github.sha }}")
          go build -ldflags "-X main.Version=${VERSION}" -o build/ecobpf ./cmd/ecobpf/

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ecobpf-binary
          path: build/ecobpf
          retention-days: 7

  # ─── Test Go ───────────────────────────────────────────────────────
  test-go:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    needs: build-go
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: go-coverage
          path: coverage.out

  # ─── Test Python ───────────────────────────────────────────────────
  test-python:
    name: Python ML Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Train model on synthetic data
        run: cd ml && python train.py --generate

      - name: Verify model artifacts
        run: |
          test -f ml/model.joblib && echo "✓ model.joblib exists"
          test -f ml/scaler.joblib && echo "✓ scaler.joblib exists"
          test -f ml/calibration_data.csv && echo "✓ calibration_data.csv exists"

  # ─── Docker Build ──────────────────────────────────────────────────
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [build-bpf, test-go, test-python]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730813e33ed4e76cdebe16d86b47b5f0c3c3ea  # v3.10.0

      - name: Build daemon image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: ecobpf-daemon:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ML service image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          file: deploy/Dockerfile.ml
          push: false
          tags: ecobpf-ml:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Docker Compose config
        run: docker compose -f deploy/docker-compose.yml config

