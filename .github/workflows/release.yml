name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.22"
  CLANG_VERSION: "14"
  REGISTRY: ghcr.io
  # Base image path — images are published as:
  #   ghcr.io/${{ github.repository_owner }}/ecobpf-daemon
  #   ghcr.io/${{ github.repository_owner }}/ecobpf-ml
  IMAGE_BASE: ${{ github.repository_owner }}

jobs:
  # ─── Validate tag ─────────────────────────────────────────────────
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release for version: ${VERSION}"

  # ─── Build eBPF probes ────────────────────────────────────────────
  build-bpf:
    name: Compile eBPF Probes
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-${{ env.CLANG_VERSION }} \
            llvm-${{ env.CLANG_VERSION }} \
            libbpf-dev \
            linux-headers-generic

      - name: Compile BPF objects
        run: |
          for src in bpf/*.bpf.c; do
            obj="${src%.bpf.c}.bpf.o"
            clang-${{ env.CLANG_VERSION }} -O2 -g -Wall -Werror \
              -target bpf -D__TARGET_ARCH_x86 \
              -I bpf/headers \
              -c "$src" -o "$obj"
          done

      - name: Upload BPF objects
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: release-bpf-objects
          path: bpf/*.bpf.o
          retention-days: 1

  # ─── Build release binaries ───────────────────────────────────────
  build-binaries:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    needs: [validate, build-bpf]
    permissions:
      contents: read
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download BPF objects
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: release-bpf-objects
          path: bpf/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          OUTPUT="build/ecobpf-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -ldflags "-X main.Version=${VERSION} -s -w" \
            -o "${OUTPUT}" \
            ./cmd/ecobpf/
          echo "Built: $(ls -lh ${OUTPUT})"

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ecobpf-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/ecobpf-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  # ─── Build and push Docker images ─────────────────────────────────
  docker-release:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [validate, build-bpf]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download BPF objects
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: release-bpf-objects
          path: bpf/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730813e33ed4e76cdebe16d86b47b5f0c3c3ea  # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (daemon)
        id: meta-daemon
        uses: docker/metadata-action@902fa8ec7d6ecbea8a986c56e9e7bb6769f8fcfe  # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/ecobpf-daemon
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Extract Docker metadata (ML service)
        id: meta-ml
        uses: docker/metadata-action@902fa8ec7d6ecbea8a986c56e9e7bb6769f8fcfe  # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/ecobpf-ml
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push daemon image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta-daemon.outputs.tags }}
          labels: ${{ steps.meta-daemon.outputs.labels }}
          build-args: VERSION=${{ needs.validate.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build and push ML service image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          file: deploy/Dockerfile.ml
          push: true
          tags: ${{ steps.meta-ml.outputs.tags }}
          labels: ${{ steps.meta-ml.outputs.labels }}
          build-args: VERSION=${{ needs.validate.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Create GitHub Release ────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-binaries, docker-release]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Download all release binaries
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          path: release-assets/
          pattern: ecobpf-*

      - name: Create checksums
        run: |
          cd release-assets
          find . -type f -name "ecobpf-*" | sort | while read f; do
            sha256sum "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          gh release create "${VERSION}" \
            --title "EcoBPF ${VERSION}" \
            --generate-notes \
            release-assets/ecobpf-linux-amd64/ecobpf-linux-amd64 \
            release-assets/ecobpf-linux-arm64/ecobpf-linux-arm64 \
            release-assets/SHA256SUMS
